[tools]
claude-code = "latest"
flux2 = "latest"
gh = "latest"
helm = "latest"
k9s = "latest"
kubeconform = "latest"
kubectl = "latest"
kubectx = "latest"
kubens = "latest"
kustomize = "latest"
krew = "latest"
sops = "latest"
age = "latest"

[env]
MISE_ENV_FILE = ".env"
# krew installs kubectl plugins (e.g. kubectl-cnpg) into ~/.krew/bin
_.path = ["~/.krew/bin"]

[hooks]
postinstall = "mise exec -- krew install cnpg"

[settings]
# hooks are still experimental in mise
experimental = true
