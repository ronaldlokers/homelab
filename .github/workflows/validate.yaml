name: Validate manifests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        uses: jdx/mise-action@v2
        with:
          install_args: kustomize kubeconform

      - name: Cache kubeconform schemas
        uses: actions/cache@v4
        with:
          path: |
            /tmp/kubeconform-schema-cache
            /tmp/flux-crd-schemas
          key: kubeconform-schemas-${{ github.run_id }}
          restore-keys: |
            kubeconform-schemas-

      - name: Validate manifests
        run: ./scripts/validate.sh
