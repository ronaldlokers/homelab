---
# Allow Prometheus to scrape metrics from system namespace pods
# This enables collection of cluster-level metrics from:
# - kube-system: kubelet, coredns, traefik, etc.
# - cnpg-system: CloudNative-PG operator
# - metallb-system: MetalLB speaker and controller
# - flux-system: Flux controllers
# - default: Kubernetes API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-to-system-namespaces
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    # Allow Prometheus to scrape kube-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Allow Prometheus to scrape cnpg-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
    # Allow Prometheus to scrape metallb-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: metallb-system
    # Allow Prometheus to scrape flux-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flux-system
    # Allow Prometheus to scrape default namespace (API server)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
    # Allow Prometheus to scrape longhorn-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: longhorn-system
    # Allow Prometheus to scrape cert-manager namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cert-manager
    # Allow Prometheus to scrape node IPs directly for hostNetwork-bound
    # targets. namespaceSelector egress rules only match traffic to pod IPs,
    # so anything bound to the node's own IP is invisible to those rules
    # above: kubelet has no pod at all, and metallb-speaker runs with
    # hostNetwork: true, making its "pod IP" the node IP too. Node-exporter
    # (9100) already needed this same workaround; kubelet (10250) and
    # metallb-speaker (7472 metrics, 7473 frr-metrics) need it too.
    - to:
        - ipBlock:
            cidr: 10.0.40.101/32
      ports:
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 7472
        - protocol: TCP
          port: 7473
    - to:
        - ipBlock:
            cidr: 10.0.40.102/32
      ports:
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 7472
        - protocol: TCP
          port: 7473
    - to:
        - ipBlock:
            cidr: 10.0.40.103/32
      ports:
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 7472
        - protocol: TCP
          port: 7473
