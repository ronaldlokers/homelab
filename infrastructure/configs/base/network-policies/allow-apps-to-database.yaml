---
# Allow incoming connections to PostgreSQL from application namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-ingress
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Any app namespace that needs database access (see homelab.io/needs-database
    # label on apps/base/*/namespace.yaml — homepage and ntfy do not have it)
    - from:
        - namespaceSelector:
            matchLabels:
              homelab.io/needs-database: "true"
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 27017
---
# Allow CloudNative-PG operator to monitor database pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator-ingress
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000  # CNPG status endpoint
---
# Allow pods within database namespace to communicate (for PostgreSQL replication)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8000
