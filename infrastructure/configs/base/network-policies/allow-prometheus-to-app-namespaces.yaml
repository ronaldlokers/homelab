---
# Allow Prometheus to scrape metrics from application namespace pods
# This enables collection of application-level metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-to-app-namespaces
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    # Any homelab app namespace (see homelab.io/app label on each apps/base/*/namespace.yaml)
    - to:
        - namespaceSelector:
            matchLabels:
              homelab.io/app: "true"
    # Allow Prometheus to scrape database namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
