---
# Allow Prometheus to scrape PostgreSQL pods in database namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
---
# Allow internal monitoring stack communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-internal
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape itself, Grafana, Alertmanager, Loki
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
    # Allow Grafana to query Prometheus, Loki, Alertmanager
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
    # Allow Loki components to communicate with each other (ring membership, replication)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
  egress:
    # Allow Prometheus to scrape other monitoring components
    - to:
        - podSelector: {}
    # Allow Alertmanager to send webhooks
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
---
# Allow Promtail/Fluentd to send logs to Loki
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-log-ingestion
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3100
---
# Allow Grafana ingress from homepage
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homepage-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homepage
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
