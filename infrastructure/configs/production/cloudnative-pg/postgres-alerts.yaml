apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudnativepg-custom-alerts
  namespace: database
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: cloudnativepg
spec:
  groups:
    - name: postgres_archiving_alerts
      rules:
        # Alert when WAL archiving fails
        - alert: PostgreSQLWALArchivingFailing
          annotations:
            summary: "PostgreSQL WAL archiving is failing on {{ $labels.pod }}"
            description: "PostgreSQL cluster {{ $labels.cnpg_io_cluster }} has {{ $value }} failed WAL archive attempts. Check B2 connectivity to https://s3.eu-central-003.backblazeb2.com and verify credentials in b2-credentials secret."
          expr: |
            cnpg_pg_stat_archiver_failed_count > 0
          for: 15m
          labels:
            severity: critical
            component: database

    - name: postgres_storage_alerts
      rules:
        # Alert when WAL directory is filling up (>70% of PVC)
        - alert: PostgreSQLWALDirectoryFilling
          annotations:
            summary: "PostgreSQL WAL directory is filling up on {{ $labels.pod }}"
            description: "WAL directory on {{ $labels.pod }} in cluster {{ $labels.cnpg_io_cluster }} is using more than 70% of available space. Current size may indicate archiving delays or failures."
          expr: |
            (cnpg_pg_wal_directory_size_bytes / (1024*1024*1024)) > 10
          for: 10m
          labels:
            severity: warning
            component: database

        # Alert on continuous archiving status
        # (cnpg_io_cluster comes from podTargetLabels on the
        # cloudnative-pg-clusters PodMonitor)
        - alert: PostgreSQLContinuousArchivingFailed
          annotations:
            summary: "PostgreSQL continuous archiving has failed on {{ $labels.cnpg_io_cluster }}"
            description: "Continuous archiving status is not healthy for cluster {{ $labels.cnpg_io_cluster }}. WAL files may accumulate and fill PVCs. Check operator logs and B2 connectivity."
          expr: |
            cnpg_collector_up{cnpg_io_cluster=~"postgres-cluster|immich-cluster"} == 1
            unless
            cnpg_collector_last_collection_error{cnpg_io_cluster=~"postgres-cluster|immich-cluster"} == 0
          for: 20m
          labels:
            severity: critical
            component: database

    - name: postgres_backup_alerts
      rules:
        # WAL archiving without a base backup provides zero recoverability:
        # firstRecoverabilityPoint stays empty and PITR is impossible. This
        # happened silently to immich-cluster for 4 months — see
        # docs/war-stories/cnpg-invisible-backup-gap.md. Only the primary
        # reports a non-zero timestamp, hence max by cluster.
        - alert: PostgreSQLBackupTooOld
          annotations:
            summary: "Last base backup of {{ $labels.cnpg_io_cluster }} is older than 26 hours"
            description: "Cluster {{ $labels.cnpg_io_cluster }} has a daily ScheduledBackup but its newest base backup is older than 26h. Check the ScheduledBackup and recent Backup objects in the database namespace."
          expr: |
            (time() - max by (cnpg_io_cluster) (cnpg_collector_last_available_backup_timestamp) > 26 * 3600)
            and
            (max by (cnpg_io_cluster) (cnpg_collector_last_available_backup_timestamp) > 0)
          for: 30m
          labels:
            severity: critical
            component: database

        - alert: PostgreSQLBackupNeverTaken
          annotations:
            summary: "Cluster {{ $labels.cnpg_io_cluster }} has no base backup at all"
            description: "No base backup has ever completed for {{ $labels.cnpg_io_cluster }} — it is not recoverable from object storage regardless of WAL archiving. Create a ScheduledBackup (with immediate: true) for it."
          expr: |
            max by (cnpg_io_cluster) (cnpg_collector_last_available_backup_timestamp) == 0
          for: 6h
          labels:
            severity: critical
            component: database
