apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/flux-alerts
patches:
  - target:
      kind: Alert
      name: flux-errors
    patch: |
      - op: add
        path: /spec/eventSources/-
        value:
          kind: HelmRelease
          name: "*"
          namespace: kyverno
