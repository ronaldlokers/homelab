apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speedtest
  template:
    metadata:
      labels:
        app: speedtest
    spec:
      containers:
        - name: speedtest
          image: lscr.io/linuxserver/speedtest-tracker:1.14.5
          ports:
            - containerPort: 80
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: DISPLAY_TIMEZONE
              value: Europe/Amsterdam
            - name: DATETIME_FORMAT
              value: "j F Y, G:i"
            - name: SPEEDTEST_SCHEDULE
              value: 37 * * * *
            - name: SPEEDTEST_SERVERS
              value: 6554,61186,52857

          # LinuxServer s6 init + Laravel bootstrap can take a while on
          # first start; the startup probe allows up to 2 minutes.
          startupProbe:
            httpGet:
              path: /api/healthcheck
              port: 80
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # CPU limit is deliberately 1 full core: throttling during a
          # speedtest run would skew the measured results.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - mountPath: /config
              name: speedtest-config
      volumes:
        - name: speedtest-config
          persistentVolumeClaim:
            claimName: speedtest-config
