apiVersion: apps/v1
kind: Deployment
metadata:
  name: commafeed
spec:
  template:
    spec:
      containers:
        - name: commafeed
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: commafeed-db-secret
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: commafeed-db-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: commafeed-db-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: COMMAFEED_PUBLIC_URL
              value: https://commafeed.ronaldlokers.nl
