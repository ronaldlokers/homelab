apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    # ntfy server configuration
    base-url: https://ntfy.ronaldlokers.nl

    # web push (keys provided via environment variables)
    web-push-file: /var/cache/ntfy/webpush.db
    web-push-email-address: ronaldlokers@me.com
    web-push-expiry-warning-duration: "55d"
    web-push-expiry-duration: "60d"

    # upstream for IOS notifcations (token provided via environment variable)
    upstream-base-url: https://ntfy.sh

    # login
    enable-login: true

    # access control: users and default access (deny-all) are provisioned
    # via NTFY_AUTH_* env vars from the SOPS secret. These ACL entries allow
    # anonymous publishing (never reading) to the alerting topics so
    # Alertmanager and Flux notification-controller can post without
    # credentials. Switch to a provisioned token if these topics ever
    # attract spam.
    auth-access:
      - "everyone:alerts:write-only"
      - "everyone:flux:write-only"

    # metrics for prometheus
    enable-metrics: true
