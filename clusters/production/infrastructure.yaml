apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 1m0s
  retryInterval: 1m
  # wait: true gates readiness on all HelmReleases being installed and
  # healthy; controller installs (Longhorn, CNPG) can take a while on a
  # fresh cluster, hence the longer timeout.
  timeout: 10m
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers/production
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers
  interval: 1m0s
  retryInterval: 1m
  # PostgreSQL cluster bootstrap (or disaster-recovery restore from B2)
  # must complete before this Kustomization reports Ready.
  timeout: 15m
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/configs/production
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
