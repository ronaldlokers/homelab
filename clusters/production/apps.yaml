apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-configs
  interval: 1m0s
  retryInterval: 1m
  # wait: true makes a failing app rollout mark this Kustomization not-Ready,
  # which feeds the Flux -> ntfy error alerts. Immich's multi-component
  # rollout needs more than the default window.
  timeout: 10m
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/production
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
